services:
  - type: web
    name: smartsum-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ENV
        value: prod
      - key: ALLOWED_ORIGINS
        value: https://smart-sum-ai.vercel.app